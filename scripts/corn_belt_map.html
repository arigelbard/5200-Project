<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Corn Belt Land Conversion Map</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

  <style>
    /* ── Reset & base ───────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0f1117;
      --surface:    #1a1d27;
      --border:     #2a2d3a;
      --text:       #e8e6e0;
      --muted:      #8a8890;
      --accent:     #c8a96e;
      --c0:         #fff7ec;
      --c1:         #fee8c8;
      --c2:         #fdd49e;
      --c3:         #fdbb84;
      --c4:         #fc8d59;
      --c5:         #ef6548;
      --c6:         #d7301f;
      --c7:         #990000;
      --no-data:    #2a2d3a;
    }

    body {
      font-family: 'Georgia', serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ─────────────────────────────────────────────────────── */
    header {
      padding: 18px 28px 14px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }

    header h1 {
      font-size: 1.25rem;
      font-weight: normal;
      letter-spacing: 0.02em;
      color: var(--text);
    }

    header p {
      font-size: 0.78rem;
      color: var(--muted);
      margin-top: 3px;
      font-family: 'Courier New', monospace;
      letter-spacing: 0.04em;
    }

    /* ── Map container ───────────────────────────────────────────────── */
    #map {
      flex: 1;
      width: 100%;
    }

    /* ── Tooltip ─────────────────────────────────────────────────────── */
    .leaflet-tooltip-custom {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 10px 14px;
      color: var(--text);
      font-family: 'Georgia', serif;
      font-size: 0.82rem;
      box-shadow: 0 4px 16px rgba(0,0,0,0.5);
      pointer-events: none;
      min-width: 180px;
    }

    .tooltip-county {
      font-size: 0.95rem;
      font-weight: bold;
      margin-bottom: 6px;
      color: var(--accent);
      letter-spacing: 0.03em;
    }

    .tooltip-row {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      margin-top: 3px;
      font-size: 0.78rem;
      color: var(--muted);
    }

    .tooltip-row span:last-child {
      color: var(--text);
      font-family: 'Courier New', monospace;
    }

    .tooltip-no-data {
      color: var(--muted);
      font-style: italic;
      font-size: 0.82rem;
    }

    /* ── Legend ──────────────────────────────────────────────────────── */
    .legend {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 14px 16px;
      font-family: 'Georgia', serif;
      color: var(--text);
      min-width: 200px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.4);
    }

    .legend-title {
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .legend-scale {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .legend-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.75rem;
      color: var(--muted);
    }

    .legend-swatch {
      width: 24px;
      height: 14px;
      border-radius: 2px;
      flex-shrink: 0;
    }

    .legend-no-data {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid var(--border);
    }

    /* ── Stats bar ───────────────────────────────────────────────────── */
    .stats-bar {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 10px 14px;
      font-family: 'Courier New', monospace;
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.04em;
      box-shadow: 0 4px 16px rgba(0,0,0,0.4);
    }

    .stats-bar .stat-value {
      color: var(--accent);
      font-size: 1rem;
      display: block;
      margin-top: 2px;
    }

    /* Override Leaflet default tile pane bg */
    .leaflet-container {
      background: var(--bg) !important;
    }
  </style>
</head>

<body>

  <header>
    <h1>Grassland &amp; Wetland Converted to Corn by County, 2006–2012</h1>
    <p>USDA Cropland Data Layer &nbsp;·&nbsp; Corn Belt states &nbsp;·&nbsp; Hover over a county for details</p>
  </header>

  <div id="map"></div>

  <script>
    // ── Color scale ──────────────────────────────────────────────────────────
    // Matches the YlOrRd palette from the matplotlib map, capped at 30%

    const BREAKS = [0, 5, 10, 15, 20, 25, 30];
    const COLORS = [
      '#fff7ec',  // 0–5%
      '#fee8c8',  // 5–10%
      '#fdd49e',  // 10–15%
      '#fdbb84',  // 15–20%
      '#fc8d59',  // 20–25%
      '#ef6548',  // 25–30%
      '#990000',  // ≥30%
    ];
    const NO_DATA_COLOR = '#2a2d3a';

    function getColor(rate) {
      if (rate === null || rate === undefined) return NO_DATA_COLOR;
      for (let i = BREAKS.length - 1; i >= 0; i--) {
        if (rate >= BREAKS[i]) return COLORS[i];
      }
      return COLORS[0];
    }

    function styleFeature(feature) {
      const rate = feature.properties.conversion_rate;
      return {
        fillColor:   getColor(rate),
        fillOpacity: rate === null ? 0.4 : 0.85,
        color:       '#1a1d27',   // county border — matches dark bg
        weight:      0.5,
        opacity:     1,
      };
    }

    // ── Map init ─────────────────────────────────────────────────────────────
    const map = L.map('map', {
      center:    [42.5, -96],
      zoom:      5,
      zoomSnap:  0.5,
      minZoom:   4,
      maxZoom:   9,
    });

    // No tile layer — we're using a dark background with just the data layer.
    // Add a subtle tile layer for geographic context if preferred:
    // L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png').addTo(map);

    // ── GeoJSON layer ─────────────────────────────────────────────────────────
    let geojsonLayer;

    function buildTooltipHTML(props) {
      if (props.conversion_rate === null || props.conversion_rate === undefined) {
        return `
          <div class="tooltip-county">${props.NAME} County</div>
          <div class="tooltip-no-data">No significant natural land</div>
        `;
      }
      const rate      = props.conversion_rate.toFixed(1);
      const converted = props.converted_ha
                          ? props.converted_ha.toLocaleString(undefined, {maximumFractionDigits: 0})
                          : '—';
      const retained  = props.retained_ha
                          ? props.retained_ha.toLocaleString(undefined, {maximumFractionDigits: 0})
                          : '—';

      return `
        <div class="tooltip-county">${props.NAME} County</div>
        <div class="tooltip-row"><span>Conversion rate</span><span>${rate}%</span></div>
        <div class="tooltip-row"><span>Converted</span><span>${converted} ha</span></div>
        <div class="tooltip-row"><span>Retained</span><span>${retained} ha</span></div>
      `;
    }

    function onEachFeature(feature, layer) {
      const tooltip = L.tooltip({
        sticky:    true,
        className: 'leaflet-tooltip-custom',
        opacity:   1,
      }).setContent(buildTooltipHTML(feature.properties));

      layer.bindTooltip(tooltip);

      layer.on({
        mouseover(e) {
          e.target.setStyle({ weight: 1.5, color: '#c8a96e' });
          e.target.bringToFront();
        },
        mouseout(e) {
          geojsonLayer.resetStyle(e.target);
        },
      });
    }

    // Load GeoJSON — update path if your file lives elsewhere
    fetch('corn_belt_conversion.geojson')
      .then(r => {
        if (!r.ok) throw new Error(`Failed to load GeoJSON: ${r.status}`);
        return r.json();
      })
      .then(data => {
        geojsonLayer = L.geoJSON(data, {
          style:         styleFeature,
          onEachFeature: onEachFeature,
        }).addTo(map);

        // Fit map to data extent
        map.fitBounds(geojsonLayer.getBounds(), { padding: [20, 20] });

        // Compute aggregate stats for the stats widget
        let totalConverted = 0;
        let totalRetained  = 0;
        let countyCount    = 0;

        data.features.forEach(f => {
          const p = f.properties;
          if (p.converted_ha) totalConverted += p.converted_ha;
          if (p.retained_ha)  totalRetained  += p.retained_ha;
          if (p.conversion_rate !== null) countyCount++;
        });

        const conversionPct = (totalConverted / (totalConverted + totalRetained) * 100).toFixed(1);
        const convertedM    = (totalConverted / 1e6).toFixed(2);

        statsControl.getContainer().innerHTML = `
          <div class="stats-bar">
            Total converted
            <span class="stat-value">${convertedM}M hectares &nbsp;·&nbsp; ${conversionPct}% of natural land</span>
          </div>
        `;
      })
      .catch(err => {
        console.error(err);
        document.getElementById('map').insertAdjacentHTML('beforeend',
          `<div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
            background:#1a1d27;border:1px solid #c8a96e;padding:20px;border-radius:4px;
            font-family:monospace;color:#c8a96e;z-index:1000;">
            ⚠ Could not load corn_belt_conversion.geojson<br>
            <small style="color:#8a8890">Make sure the file is in the same folder as this HTML</small>
          </div>`
        );
      });

    // ── Legend control ────────────────────────────────────────────────────────
    const legendControl = L.control({ position: 'bottomright' });
    legendControl.onAdd = function() {
      const div = L.DomUtil.create('div', 'legend');
      const rows = BREAKS.map((brk, i) => {
        const label = i < BREAKS.length - 1
          ? `${BREAKS[i]}–${BREAKS[i+1]}%`
          : `≥${BREAKS[i]}%`;
        return `
          <div class="legend-bar">
            <div class="legend-swatch" style="background:${COLORS[i]}"></div>
            <span>${label}</span>
          </div>`;
      });

      div.innerHTML = `
        <div class="legend-title">% Natural Land Converted</div>
        <div class="legend-scale">${rows.join('')}</div>
        <div class="legend-no-data">
          <div class="legend-swatch" style="background:${NO_DATA_COLOR};opacity:0.4;border:1px solid #444"></div>
          <span>No significant natural land</span>
        </div>
      `;
      return div;
    };
    legendControl.addTo(map);

    // ── Stats control ─────────────────────────────────────────────────────────
    const statsControl = L.control({ position: 'topleft' });
    statsControl.onAdd = function() {
      const div = L.DomUtil.create('div', 'stats-bar');
      div.innerHTML = 'Loading...';
      return div;
    };
    statsControl.addTo(map);

  </script>
</body>
</html>
